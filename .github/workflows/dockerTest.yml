name: Test Docker Image

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/docker-test.yml"
      - ".github/workflows/Azure+DockerBuild.yml"
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-image:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'merge_group' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed') ||
      github.event.pull_request.merged == true
    permissions:
      contents: read
      checks: write
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Resolve the correct SHA to post statuses against.
      # On pull_request events, context.sha is the ephemeral merge commit SHA,
      # not the head commit — branch protection checks the head SHA, so we must
      # use pull_request.head.sha explicitly.
      # On merge_group events, context.sha is the temporary merge branch commit
      # SHA, which is the correct target for status checks.
      - name: Resolve commit SHA
        id: sha
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            return context.eventName === 'pull_request'
              ? context.payload.pull_request.head.sha
              : context.sha;

      - name: Set status – pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.sha.outputs.result }}',
              state: 'pending',
              context: 'Docker / Build & Verify',
              description: 'Building and verifying Docker image…',
            });

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: williams-rgss-frontend:test
          # Cache layers between runs to speed up builds on repeat PRs
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container starts
        run: |
          docker run -d --name frontend-test -p 3000:3000 williams-rgss-frontend:test

          # Poll until the container is healthy or the timeout is reached
          echo "Waiting for container to become ready…"
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Status}}' frontend-test 2>/dev/null || echo "missing")
            if [ "$STATUS" = "running" ]; then
              echo "Container is running after ${i}×5 s"
              break
            fi
            if [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ]; then
              echo "Container exited early (status: $STATUS)"
              docker logs frontend-test
              exit 1
            fi
            echo "  Status: $STATUS — retrying in 5 s…"
            sleep 5
          done

          # Final health check
          FINAL=$(docker inspect --format='{{.State.Status}}' frontend-test)
          if [ "$FINAL" != "running" ]; then
            echo "Container did not reach running state (got: $FINAL)"
            docker logs frontend-test
            exit 1
          fi

          echo "=== Container logs ==="
          docker logs frontend-test

          docker stop frontend-test

      - name: Set status – success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.sha.outputs.result }}',
              state: 'success',
              context: 'Docker / Build & Verify',
              description: 'Image built and container started successfully.',
            });

      - name: Set status – failure
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.sha.outputs.result }}',
              state: 'failure',
              context: 'Docker / Build & Verify',
              description: 'Docker build or container verification failed.',
            });
