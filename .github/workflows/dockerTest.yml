name: Test Docker Image
on: 
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/docker-test.yml"
      - ".github/workflows/Azure+DockerBuild.yml"
  pull_request:
    types:
      - closed
    branches:
      - testing-dev
    paths:
      - "frontend/**"
      - ".github/workflows/docker-test.yml"
      - ".github/workflows/Azure+DockerBuild.yml"
  workflow_dispatch:
jobs:
  build-test-image:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: williams-rgss-frontend:test
      - name: Verify container starts
        run: |
          docker run -d --name frontend-test -p 3000:3000 williams-rgss-frontend:test
          docker ps --filter "name=frontend-test"
          docker logs frontend-test
          docker stop frontend-test
