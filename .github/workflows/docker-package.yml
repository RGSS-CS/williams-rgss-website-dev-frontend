name: Publish Frontend Package

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-publish.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to GHCR
      statuses: write   # Required to post commit statuses

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # context.sha on a push to main is the real merge commit SHA — no
      # ephemeral merge-commit indirection like on pull_request events, so
      # we can use it directly for all status posts.
      - name: Set status – pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'Docker / Frontend Publish',
              description: 'Building and publishing frontend image to GHCR…',
            });

      # Extracts metadata (tags, labels) from the repo context.
      # docker/metadata-action produces two tags automatically:
      #   • ghcr.io/<owner>/<repo>/frontend:latest  (always on main)
      #   • ghcr.io/<owner>/<repo>/frontend:sha-<short-sha>  (immutable, for deploys)
      # Source: https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=latest,enable=true
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR using the GITHUB_TOKEN — no stored PAT needed.
      # The packages: write permission above grants push access.
      # Source: https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-with-a-personal-access-token-classic
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Re-use layer cache from previous runs to keep build times low
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Expose the image digest and the SHA-pinned tag as outputs so that a
      # downstream deploy job (e.g. Azure Container Apps) can reference the
      # exact immutable image that was just published.
      - name: Export image references
        run: |
          echo "### Frontend image published :package:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field  | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| ------ | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA tag | \`ghcr.io/${{ github.repository }}/frontend:sha-$(echo ${{ github.sha }} | cut -c1-7)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest tag | \`ghcr.io/${{ github.repository }}/frontend:latest\` |" >> $GITHUB_STEP_SUMMARY

      - name: Set status – success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'Docker / Frontend Publish',
              description: 'Frontend image published to GHCR.',
            });

      - name: Set status – failure
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'Docker / Frontend Publish',
              description: 'Frontend image build or push failed.',
            });
