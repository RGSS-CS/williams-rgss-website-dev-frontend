name: Test Docker Image
on: 
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/docker-test.yml"
      - ".github/workflows/Azure+DockerBuild.yml"
  pull_request:
    types:
      - closed
    branches:
      - testing-dev
    paths:
      - "frontend/**"
      - ".github/workflows/docker-test.yml"
      - ".github/workflows/Azure+DockerBuild.yml"
  workflow_dispatch:

jobs:
  build-test-image:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    permissions:
      contents: read
      checks: write        # Required to create/update check runs
      statuses: write      # Required to write commit statuses

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Post "pending" status immediately so the check appears before work begins
      - name: Set status – pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'Docker / Build & Verify',
              description: 'Building and verifying Docker image…',
            });

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: williams-rgss-frontend:test

      - name: Verify container starts
        run: |
          docker run -d --name frontend-test -p 3000:3000 williams-rgss-frontend:test
          sleep 5        # Give the container a moment to settle
          docker ps --filter "name=frontend-test" --format "table {{.Names}}\t{{.Status}}"
          docker logs frontend-test
          docker stop frontend-test

      # Mark success only if every prior step passed
      - name: Set status – success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'Docker / Build & Verify',
              description: 'Image built and container started successfully.',
            });

      # Mark failure if any prior step failed or was cancelled
      - name: Set status – failure
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'Docker / Build & Verify',
              description: 'Docker build or container verification failed.',
            });
