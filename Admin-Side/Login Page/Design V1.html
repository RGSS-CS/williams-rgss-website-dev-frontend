<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Exec Dashboard | GW Williams</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --navy:       #0b1c3a;
      --navy-deep:  #07111f;
      --navy-mid:   #162d52;
      --gold:       #f6ae2d;
      --gold-dark:  #c88a1a;
      --gold-light: #fff3d0;
      --white:      #ffffff;
      --off-white:  #f5f7fa;
      --ink:        #111827;
      --muted:      #64748b;
      --line:       #e2e8f0;
      --green:      #16a34a;
      --red:        #dc2626;
      --red-bg:     #fee2e2;

      --font-head:  'Montserrat', sans-serif;
      --font-body:  'DM Sans', sans-serif;
      --font-disp:  'Bebas Neue', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }

    body {
      font-family: var(--font-body);
      background: var(--off-white);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .login-card {
      background: white;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
    }

    .card-header {
      margin-bottom: 32px;
    }

    .card-header h2 {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--navy);
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Form fields */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap > i {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.82rem;
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1.5px solid var(--line);
      border-radius: 9px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--ink);
      background: white;
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
    }

    .input-wrap input::placeholder { color: #c0cad8; }

    .input-wrap input:focus {
      border-color: var(--navy-mid);
      box-shadow: 0 0 0 3px rgba(11,28,58,0.08);
    }

    .input-wrap .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--muted);
      font-size: 0.82rem;
      background: none;
      border: none;
      padding: 4px 6px;
      line-height: 1;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .input-wrap .toggle-pw:hover { color: var(--navy); }

    /* Remember + forgot row */
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      margin-top: 4px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--navy);
      cursor: pointer;
    }

    .remember span {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .forgot-link {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--navy-mid);
      text-decoration: none;
      transition: color 0.15s;
    }

    .forgot-link:hover { color: var(--gold-dark); }

    /* Login button */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.18s, transform 0.12s;
    }

    .btn-login:hover { background: var(--navy-mid); }
    .btn-login:active { transform: scale(0.98); }

    /* Error alert */
    .alert-error {
      display: none;
      align-items: center;
      gap: 9px;
      background: var(--red-bg);
      border: 1px solid rgba(220,38,38,0.2);
      border-radius: 9px;
      padding: 10px 14px;
      margin-bottom: 18px;
      font-size: 0.83rem;
      color: var(--red);
      font-weight: 500;
    }

    .alert-error.visible { display: flex; }
    .alert-error i { flex-shrink: 0; }

    /* Card footer note */
    .card-footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .card-footer-note a {
      color: var(--navy);
      font-weight: 700;
      text-decoration: none;
    }

    .card-footer-note a:hover { color: var(--gold-dark); }


  </style>
</head>
<body>

  <div class="login-card">

      <div class="card-header">
        <h2>Welcome back 👋</h2>
        <p>Sign in to access your club dashboard.</p>
      </div>


      <!-- Error alert (hidden by default) -->
      <div class="alert-error" id="alertError">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="alertMsg">Invalid email or password. Please try again.</span>
      </div>

      <!-- Form -->
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="emailInput" placeholder="you@school.ca" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password">
          <button class="toggle-pw" id="togglePw" type="button" aria-label="Toggle password visibility">
            <i class="fa-regular fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <div class="form-row">
        <label class="remember">
          <input type="checkbox" id="rememberMe">
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
        Sign In
      </button>

      <p class="card-footer-note">
        Don't have access? <a href="#">Contact your school admin</a>
      </p>

    </div>

  <script>
    // Toggle password visibility
    const pwInput   = document.getElementById('pwInput');
    const toggleBtn = document.getElementById('togglePw');
    const toggleIcon = document.getElementById('toggleIcon');

    toggleBtn.addEventListener('click', () => {
      const showing = pwInput.type === 'text';
      pwInput.type = showing ? 'password' : 'text';
      toggleIcon.className = showing ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
    });

    // Login demo
    function handleLogin() {
      const email = document.getElementById('emailInput').value.trim();
      const pw    = document.getElementById('pwInput').value;
      const alert = document.getElementById('alertError');
      const msg   = document.getElementById('alertMsg');

      alert.classList.remove('visible');

      if (!email || !pw) {
        msg.textContent = 'Please enter your email and password.';
        alert.classList.add('visible');
        return;
      }

      if (!email.includes('@')) {
        msg.textContent = 'Please enter a valid email address.';
        alert.classList.add('visible');
        return;
      }

      // Demo success flash
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing in…';
      btn.disabled = true;

      setTimeout(() => {
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Signed In!';
        btn.style.background = '#16a34a';
      }, 1200);
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
