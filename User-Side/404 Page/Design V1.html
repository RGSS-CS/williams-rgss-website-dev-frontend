<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | GW Williams</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --navy:      #0b1c3a;
      --navy-deep: #07111f;
      --navy-mid:  #162d52;
      --gold:      #f6ae2d;
      --gold-dark: #c88a1a;
      --muted:     rgba(255,255,255,0.4);
      --line:      rgba(255,255,255,0.07);
      --font-disp: 'Bebas Neue', sans-serif;
      --font-head: 'Montserrat', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--navy-deep);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 60%, rgba(246,174,45,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(11,28,58,0.9) 0%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(7,17,31,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 12px;
      z-index: 10;
    }

    .topbar-brand {
      width: 32px; height: 32px;
      background: var(--gold);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--navy);
      font-size: 0.85rem;
    }

    .topbar-name {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 0.82rem;
      color: white;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .gif-stage {
      position: relative;
      width: 380px;
      max-width: 100%;
    }

    /* 404 pinned to vertical center of the gif */
    .overlay-404 {
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }

    .num-404 {
      font-family: var(--font-disp);
      font-size: 7rem;
      line-height: 1;
      letter-spacing: 0.04em;
      color: white;
      text-shadow:
        0 0 40px rgba(246,174,45,0.6),
        0 2px 0 rgba(0,0,0,0.5),
        0 4px 24px rgba(0,0,0,0.7);
    }

    .num-404 span { color: var(--gold); }

    .gif-frame {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 1px rgba(246,174,45,0.1),
        0 24px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      background: var(--navy-mid);
      position: relative;
    }

    /* mid-band scrim so centered text is always legible */
    .gif-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(
        to bottom,
        rgba(7,17,31,0.15) 0%,
        rgba(7,17,31,0.55) 35%,
        rgba(7,17,31,0.55) 65%,
        rgba(7,17,31,0.15) 100%
      );
      pointer-events: none;
      z-index: 1;
    }

    .gif-frame img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      border-radius: 20px;
    }

    .copy {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .copy h1 {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.25rem;
      color: white;
      line-height: 1.3;
    }

    .copy p {
      font-size: 0.88rem;
      color: var(--muted);
      max-width: 300px;
      line-height: 1.65;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s, transform 0.12s;
    }

    .btn-home:hover { background: var(--gold-dark); }
    .btn-home:active { transform: scale(0.97); }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s, border-color 0.18s;
    }

    .btn-back:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand"><i class="fa-solid fa-paw"></i></div>
    <div>
      <div class="topbar-name">GW Williams SS</div>
    </div>
    <span style="margin-left:4px; color:rgba(255,255,255,0.2); font-size:0.75rem;">·</span>
  </div>

  <div class="content">

    <div class="gif-stage">
      <div class="overlay-404">
        <div class="num-404">4<span>0</span>4</div>
      </div>
      <div class="gif-frame">
        <img src="/assets/gif/meowl.gif">
      </div>
    </div>

    <div class="copy">
      <h1>😨</h1>
      <p>The page you're looking for doesn't exist or may have been moved. Head back to safety.</p>
    </div>

    <div class="actions">
      <a href="/" class="btn-home">
        <i class="fa-solid fa-house"></i>
        Go to Home
      </a>
      <a href="javascript:history.back()" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i>
        Go Back
      </a>
    </div>

  </div>

</body>
</html>
