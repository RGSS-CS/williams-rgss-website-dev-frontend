name: Trigger auto deployment for frontend-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/frontend-dev-AutoDeployTrigger-95aa3791-c8cb-40d6-ae0f-0731fa006523.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.FRONTENDDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FRONTENDDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.FRONTENDDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/Frontend/Dockefile
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.FRONTENDDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FRONTENDDEV_REGISTRY_PASSWORD }}
          containerAppName: frontend-dev
          resourceGroup: williams-rgss-dev-REgroup
          imageToBuild: ghcr.io/frontend-dev:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


